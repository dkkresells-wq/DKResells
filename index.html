<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DK Resells</title>
<link rel="icon" href="logo.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 200px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    transform: scale(1.05);
}

#menu {
    display: none;
    margin-top: 40px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin: 10px auto;
    width: 260px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<h1>DK RESELLS</h1>

<div id="login">
    <p>Enter access code</p>
    <input type="password" id="kode">
    <br>
    <button onclick="tjekKode()">Continue</button>
    <p id="fejl"></p>
</div>

<div id="menu">
    <h2>Select destination</h2>

    <div class="card"><button onclick="go('https://www.temu.com/')">Temu</button></div>
    <div class="card"><button onclick="go('https://www.vinted.com/')">Vinted</button></div>
    <div class="card"><button onclick="go('https://wanes.dk/forsideww.repd')">RepDanes</button></div>
    <div class="card"><button onclick="go('https://www.acbuy.com/product?id=970916386889&u=XNX5L3&source=AL')">Hoodie Supplier</button></div>
    <div class="card"><button onclick="go('https://www.acbuy.com/product?id=922835150765&u=FIL339TES&source=AL')">Cap Supplier</button></div>
    <div class="card"><button onclick="go('https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL')">T-Shirt Supplier</button></div>

</div>

</div>

<script>
function tjekKode() {
    const rigtigKode = "1337"; // skift kode her
    const input = document.getElementById("kode").value;

    if (input === rigtigKode) {
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
    } else {
        document.getElementById("fejl").innerText = "Forkert kode";
        document.getElementById("fejl").style.color = "red";
    }
}

function go(url) {
    window.location.href = url;
}
</script>

</body>
</html>
