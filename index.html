<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Crosser Game</title>
<style>
  body { margin:0; overflow:hidden; }
  canvas { display:block; background: linear-gradient(#87CEEB, #f4a460); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let speed = 0;
let wheelie = false;

const player = {
  x: canvas.width/2,
  y: canvas.height - 150,
  width: 50,
  height: 80,
  angle: 0
};

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(canvas.width/2 - 100, 0, 200, canvas.height);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 5;
  for (let i=0;i<canvas.height;i+=40) {
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, i);
    ctx.lineTo(canvas.width/2, i+20);
    ctx.stroke();
  }
}

function drawBeach() {
  ctx.fillStyle = "#f4a460";
  ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

  ctx.fillStyle = "#1e90ff";
  ctx.fillRect(0, canvas.height/2 + 100, canvas.width, 200);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  ctx.fillStyle = "red";
  ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);

  ctx.restore();
}

function update() {
  if (keys["w"]) {
    speed += 0.2;
  } else {
    speed *= 0.98;
  }

  if (keys["shift"]) {
    wheelie = true;
    player.angle = -0.5;
  } else {
    wheelie = false;
    player.angle = 0;
  }
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBeach();
  drawRoad();
  drawPlayer();
  update();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
