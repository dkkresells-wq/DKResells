<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Crosser Spil</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #222;
      color: white;
    }

    #login {
      margin-top: 100px;
    }

    #game {
      display: none;
    }

    canvas {
      background: #444;
      display: block;
      margin: 20px auto;
      border: 2px solid white;
    }
  </style>
</head>
<body>

<div id="login">
  <h1>Login</h1>
  <p>Indtast kode:</p>
  <input type="password" id="codeInput">
  <button onclick="checkCode()">Log ind</button>
  <p id="error"></p>
</div>

<div id="game">
  <h1>Crosser Spil 🏍️</h1>
  <canvas id="canvas" width="800" height="400"></canvas>
  <p>Brug piletaster ↑ ↓ → ←</p>
</div>

<script>
function checkCode() {
  const code = document.getElementById("codeInput").value;
  if (code === "8765") {
    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";
    startGame();
  } else {
    document.getElementById("error").innerText = "Forkert kode!";
  }
}

function startGame() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let bike = {
    x: 100,
    y: 300,
    width: 50,
    height: 30,
    speed: 0
  };

  let gravity = 0.5;
  let velocityY = 0;
  let jumping = false;

  function drawBike() {
    ctx.fillStyle = "lime";
    ctx.fillRect(bike.x, bike.y, bike.width, bike.height);
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // tyngdekraft
    velocityY += gravity;
    bike.y += velocityY;

    // jord
    if (bike.y > 300) {
      bike.y = 300;
      velocityY = 0;
      jumping = false;
    }

    drawBike();
    requestAnimationFrame(update);
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowRight") {
      bike.x += 10;
    }
    if (e.key === "ArrowLeft") {
      bike.x -= 10;
    }
    if (e.key === "ArrowUp" && !jumping) {
      velocityY = -10;
      jumping = true;
    }
  });

  update();
}
</script>

</body>
</html>
