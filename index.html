<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DK Resells</title>
<link rel="icon" href="logo.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;

    /* 🇩🇰 Danmark + tekst baggrund */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://upload.wikimedia.org/wikipedia/commons/9/9c/Flag_of_Denmark.svg");
    background-size: cover;
    background-position: center;
}

h1 {
    margin-top: 80px;
    font-size: 45px;
    letter-spacing: 3px;
    text-shadow: 0 0 20px #00c6ff;
}

/* Glass UI */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    margin: 30px auto;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,198,255,0.3);
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00c6ff;
}

#menu {
    display: none;
}

.link {
    display: block;
    margin: 10px auto;
    width: 260px;
}

.status {
    margin-top: 10px;
    height: 20px;
}
</style>
</head>

<body>

<h1>🇩🇰 DK RESELLS</h1>

<div id="login" class="glass">
    <p>Secure Access</p>
    <input type="password" id="kode" placeholder="Kode" onkeydown="enter(event)">
    <br>
    <button onclick="tjekKode()">Login</button>
    <div class="status" id="status"></div>
</div>

<div id="menu" class="glass">
    <h2>Vælg side</h2>

    <button class="link" onmouseover="hoverSound()" onclick="go('https://www.temu.com/')">Temu</button>
    <button class="link" onmouseover="hoverSound()" onclick="go('https://www.vinted.com/')">Vinted</button>
    <button class="link" onmouseover="hoverSound()" onclick="go('https://wanes.dk/forsideww.repd')">RepDanes</button>
    <button class="link" onmouseover="hoverSound()" onclick="go('https://www.acbuy.com/product?id=970916386889&u=XNX5L3&source=AL')">Hoodie Supplier</button>
    <button class="link" onmouseover="hoverSound()" onclick="go('https://www.acbuy.com/product?id=922835150765&u=FIL339TES&source=AL')">Cap Supplier</button>
    <button class="link" onmouseover="hoverSound()" onclick="go('https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL')">T-Shirt Supplier</button>

</div>

<script>
function enter(e){
    if(e.key === "Enter") tjekKode();
}

/* 🔊 LYDE */
function play(freq){
    let ctx = new AudioContext();
    let osc = ctx.createOscillator();
    osc.frequency.value = freq;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),120);
}

function hoverSound(){
    play(500); // hover
}

function tjekKode(){
    const kode = "1337";
    const input = document.getElementById("kode").value;
    const status = document.getElementById("status");

    play(300);

    if(input === kode){
        status.innerText = "Adgang godkendt";
        status.style.color = "lightgreen";
        play(800);

        setTimeout(()=>{
            document.getElementById("login").style.display="none";
            document.getElementById("menu").style.display="block";
        },800);

    } else {
        status.innerText = "Forkert kode";
        status.style.color = "red";
        play(150);
    }
}

function go(url){
    play(700);
    setTimeout(()=>{ window.location.href = url; },200);
}
</script>

</body>
</html>
