<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Crosser Pro</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; margin:auto; background:#222; }
    #ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; }
    #startScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.8); color:white; flex-direction:column;
      font-family:Arial;
    }
    button { padding:10px 20px; font-size:18px; cursor:pointer; }
  </style>
</head>
<body>
<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <div>Highscore: <span id="highscore">0</span></div>
</div>

<div id="startScreen">
  <h1>Crosser Pro</h1>
  <button onclick="startGame()">Start</button>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player, cars, score, level, speed, gameRunning;
let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").innerText = highscore;

function init() {
  player = { x:180, y:550, size:20 };
  cars = [];
  score = 0;
  level = 1;
  speed = 2;
  gameRunning = true;
}

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  init();
  update();
}

function spawnCar() {
  if (!gameRunning) return;
  const y = Math.floor(Math.random() * 10) * 60;
  const dir = Math.random() > 0.5 ? 1 : -1;
  cars.push({ x: dir === 1 ? -50 : 450, y, w:50, h:30, dir });
}

function drawPlayer() {
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

function drawCars() {
  ctx.fillStyle = "red";
  cars.forEach(car => {
    car.x += speed * car.dir;
    ctx.fillRect(car.x, car.y, car.w, car.h);

    // collision
    if (player.x < car.x + car.w &&
        player.x + player.size > car.x &&
        player.y < car.y + car.h &&
        player.y + player.size > car.y) {
      gameOver();
    }
  });
}

function gameOver() {
  gameRunning = false;
  if (score > highscore) {
    localStorage.setItem("highscore", score);
  }
  alert("Game Over! Score: " + score);
  location.reload();
}

function update() {
  if (!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();
  drawCars();

  cars = cars.filter(c => c.x > -60 && c.x < 460);

  if (player.y <= 0) {
    score++;
    level++;
    speed += 0.5;
    player.y = 550;
  }

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;

  requestAnimationFrame(update);
}

// controls (keyboard)
window.addEventListener("keydown", e => {
  if (!gameRunning) return;
  if (e.key === "ArrowUp") player.y -= 60;
  if (e.key === "ArrowDown") player.y += 60;
  if (e.key === "ArrowLeft") player.x -= 40;
  if (e.key === "ArrowRight") player.x += 40;
});

// mobile touch
canvas.addEventListener("touchstart", e => {
  const x = e.touches[0].clientX;
  if (x < window.innerWidth / 2) player.x -= 40;
  else player.x += 40;
  player.y -= 60;
});

// spawn loop
setInterval(spawnCar, 1200);
</script>
</body>
</html>
