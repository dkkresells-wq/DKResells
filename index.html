<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Resells</title>
  <link rel="icon" type="image/png" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Center */
.center {
  text-align: center;
  padding: 80px 20px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(0,255,255,0.6);
}

/* Hoodies page */
#hoodiesPage {
  display: none;
  padding: 20px;
}

.back {
  cursor: pointer;
  margin-bottom: 20px;
  color: cyan;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
}

/* Hoodie item */
.item {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px cyan;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

/* Glow title */
h1 {
  font-size: 50px;
  text-shadow: 0 0 20px cyan;
}
</style>
</head>

<body>

<!-- FORSIDE -->
<div id="home" class="center">
  <h1>⚡ HighTech Shop</h1>

  <div class="cards">
    <div class="card" onclick="showHoodies()">🧥 Hoodies</div>
    <div class="card">🧢 Caps</div>
    <div class="card">👕 T-Shirts</div>
  </div>
</div>

<!-- HOODIES -->
<div id="hoodiesPage">
  <div class="back" onclick="goHome()">⬅ Tilbage</div>
  <h2>🧥 Hoodies</h2>

  <div class="grid" id="grid"></div>
</div>

<script>
// 🔥 DIN FIL
const hoodieImage = "HoodieRyg.png";

function randomPrice() {
  return Math.floor(Math.random() * 1200) + 300;
}

function showHoodies() {
  document.getElementById("home").style.display = "none";
  document.getElementById("hoodiesPage").style.display = "block";

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  // laver mange hoodies ud fra dit ene billede
  for (let i = 0; i < 20; i++) {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${hoodieImage}">
      <p>${randomPrice()} DKK</p>
    `;

    grid.appendChild(div);
  }
}

function goHome() {
  document.getElementById("home").style.display = "block";
  document.getElementById("hoodiesPage").style.display = "none";
}
</script>

</body>
</html>
