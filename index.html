<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Resells 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#0b0b0c;color:white}
header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#111}
.logo{font-weight:800}
nav button{margin:0 5px;padding:8px 12px;border-radius:20px;background:#222;color:white;border:none}
nav button.active{background:#00ff88;color:black}
.cart{cursor:pointer}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#1a1a1a;border-radius:15px;overflow:hidden;transition:.3s}
.card:hover{transform:scale(1.05);box-shadow:0 0 30px #00ff88}
.card img{width:100%;height:220px;object-fit:cover}
.card-content{padding:15px;text-align:center}
.price{color:#00ff88}
button{padding:10px;border:none;border-radius:10px;background:#00ff88;cursor:pointer}
.cart-panel{position:fixed;right:-300px;top:0;width:300px;height:100%;background:#111;padding:20px;transition:.3s}
.cart-panel.open{right:0}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px}
input{padding:10px;border-radius:10px;border:none;width:250px;background:#222;color:white}
</style>
</head>
<body>

<div id="app"></div>

<script>
const app=document.getElementById('app');
let user=JSON.parse(localStorage.getItem('user'));
let cart=JSON.parse(localStorage.getItem('cart')||'[]');
let category='hoodies';

const products={
hoodies:[{name:'Nike Hoodie',price:499,img:'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf'}],
tshirts:[{name:'Oversized Tee',price:299,img:'https://images.unsplash.com/photo-1523381210434-271e8be1f52b'}],
caps:[{name:'Street Cap',price:199,img:'https://images.unsplash.com/photo-1514996937319-344454492b37'}]
};

if(user){renderShop()}else{renderLogin()}

function renderLogin(){
app.innerHTML=`<div class='center'>
<h1>DK RESELLS 🔥</h1>
<input id='email' placeholder='Email'>
<input id='password' type='password' placeholder='Password'>
<button onclick='signup()'>Sign Up</button>
<button onclick='login()'>Login</button>
</div>`
}

function signup(){
let email=emailInput(); let password=passwordInput();
localStorage.setItem(email,JSON.stringify({email,password,orders:[]}));
localStorage.setItem('user',JSON.stringify({email}));
sendMail('Ny bruger',email);
renderShop();
}

function login(){
let email=emailInput(); let password=passwordInput();
let data=JSON.parse(localStorage.getItem(email));
if(data&&data.password===password){
localStorage.setItem('user',JSON.stringify({email}));
renderShop();
}else alert('Forkert');
}

function renderShop(){
let list=products[category];
app.innerHTML=`
<header>
<div class='logo'>DK RESELLS</div>
<nav>
<button onclick="change('hoodies')" class='${category==='hoodies'?'active':''}'>Hoodies</button>
<button onclick="change('tshirts')" class='${category==='tshirts'?'active':''}'>T-Shirts</button>
<button onclick="change('caps')" class='${category==='caps'?'active':''}'>Caps</button>
</nav>
<div class='cart' onclick='toggleCart()'>🛒 ${cart.length}</div>
</header>

<div class='products'>
${list.map(p=>`
<div class='card'>
<img src='${p.img}'>
<div class='card-content'>
<h3>${p.name}</h3>
<div class='price'>${p.price} kr</div>
<button onclick="add('${p.name}',${p.price})">Køb</button>
</div>
</div>
`).join('')}
</div>

<div id='cartPanel' class='cart-panel'></div>
`}

function change(c){category=c;renderShop()}

function add(name,price){cart.push({name,price});save();renderShop()}

function toggleCart(){
let p=document.getElementById('cartPanel');
p.classList.toggle('open');
p.innerHTML=`<h2>Kurv</h2>
${cart.map(i=>`<p>${i.name}</p>`).join('')}
<button onclick='checkout()'>Checkout</button>`}

function checkout(){
let u=JSON.parse(localStorage.getItem(user.email));
u.orders.push(cart);
localStorage.setItem(user.email,JSON.stringify(u));
sendMail('Ny ordre',JSON.stringify(cart));
cart=[];save();alert('Købt!');renderShop();
}

function save(){localStorage.setItem('cart',JSON.stringify(cart))}

function sendMail(subject,message){
fetch('https://formspree.io/f/YOUR_ID',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({subject,message})});
}

function emailInput(){return document.getElementById('email').value}
function passwordInput(){return document.getElementById('password').value}

</script>

</body>
</html>
