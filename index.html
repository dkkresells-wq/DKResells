<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DK Resells</title>
<link rel="icon" href="logo.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #0a0f1a);
    color: white;
    overflow: hidden;
}

/* Glow background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00c6ff, #0072ff, #00c6ff);
    animation: move 8s linear infinite;
    opacity: 0.1;
}

@keyframes move {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 10%;
}

h1 {
    font-size: 42px;
    letter-spacing: 2px;
    text-shadow: 0 0 20px #00c6ff;
}

.glass {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    width: 300px;
    margin: auto;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,198,255,0.2);
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 15px;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #00c6ff;
}

#menu {
    display: none;
    margin-top: 30px;
}

.link {
    margin: 10px;
    display: block;
}

.status {
    margin-top: 10px;
    height: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>DK RESELLS SYSTEM</h1>

<div id="login" class="glass">
    <p>Secure Login</p>
    <input type="password" id="kode" placeholder="Access Code">
    <br>
    <button onclick="tjekKode()">Unlock</button>
    <div class="status" id="status"></div>
</div>

<div id="menu" class="glass">
    <h2>Dashboard</h2>

    <button class="link" onclick="go('https://www.temu.com/')">Temu</button>
    <button class="link" onclick="go('https://www.vinted.com/')">Vinted</button>
    <button class="link" onclick="go('https://wanes.dk/forsideww.repd')">RepDanes</button>
    <button class="link" onclick="go('https://www.acbuy.com/product?id=970916386889&u=XNX5L3&source=AL')">Hoodie Supplier</button>
    <button class="link" onclick="go('https://www.acbuy.com/product?id=922835150765&u=FIL339TES&source=AL')">Cap Supplier</button>
    <button class="link" onclick="go('https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL')">T-Shirt Supplier</button>

</div>

</div>

<script>
function tjekKode() {
    const kode = "1234"; // skift her
    const input = document.getElementById("kode").value;
    const status = document.getElementById("status");

    status.innerText = "Checking...";
    status.style.color = "#00c6ff";

    setTimeout(() => {
        if (input === kode) {
            status.innerText = "Access Granted";
            status.style.color = "lightgreen";

            setTimeout(() => {
                document.getElementById("login").style.display = "none";
                document.getElementById("menu").style.display = "block";
            }, 800);

        } else {
            status.innerText = "Access Denied";
            status.style.color = "red";
        }
    }, 1000);
}

function go(url) {
    window.location.href = url;
}
</script>

</body>
</html>
