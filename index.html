<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DK Resells</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Center */
.center {
  text-align: center;
  padding: 60px 20px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px cyan;
}

/* Pages */
.page {
  display: none;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
}

.item {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 15px;
  text-align: center;
}

.item img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.back {
  cursor: pointer;
  margin-bottom: 20px;
  color: cyan;
}

.cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px;
  border-radius: 50%;
}
</style>
</head>

<body>

<!-- FORSIDE -->
<div id="home" class="center">
  <img src="logo.png" style="width:100px;">
  <h1>DK Resells</h1>

  <div class="cards">
    <div class="card" onclick="showHoodies()">🧥 Hoodies</div>
    <div class="card">🧢 Caps</div>
    <div class="card">👕 T-Shirts</div>
  </div>
</div>

<!-- HOODIES -->
<div id="hoodiesPage" class="page">
  <div class="back" onclick="goHome()">⬅ Tilbage</div>
  <h2>🧥 Hoodies</h2>

  <div class="grid" id="grid"></div>
</div>

<!-- PRODUKT -->
<div id="productPage" class="page">
  <div class="back" onclick="showHoodies()">⬅ Tilbage</div>

  <img id="productImg" style="width:200px;">
  <h2 id="productPrice"></h2>

  <button onclick="addToCart()">Tilføj til kurv</button>
</div>

<!-- KURV -->
<div id="cartPage" class="page">
  <div class="back" onclick="goHome()">⬅ Tilbage</div>

  <h2>🛒 Kurv</h2>
  <div id="cartItems"></div>

  <button onclick="checkout()">Færdiggør køb</button>
</div>

<button class="cartBtn" onclick="openCart()">🛒</button>

<script>
const hoodies = [
  "hoodie_1.png",
  "hoodie_2.png",
  "hoodie_3.png",
  "hoodie_4.png",
  "hoodie_5.png",
  "hoodie_6.png",
  "hoodie_7.png",
  "hoodie_8.png"
];

let cart = [];
let currentProduct = null;
let userEmail = localStorage.getItem("email") || null;

function randomPrice() {
  return Math.floor(Math.random() * 1200) + 300;
}

function showHoodies() {
  hideAll();
  document.getElementById("hoodiesPage").style.display = "block";

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  hoodies.forEach(img => {
    const price = randomPrice();

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${img}" onclick="openProduct('${img}', ${price})">
      <p>${price} DKK</p>
    `;

    grid.appendChild(div);
  });
}

function openProduct(img, price) {
  currentProduct = { img, price };

  hideAll();
  document.getElementById("productPage").style.display = "block";

  document.getElementById("productImg").src = img;
  document.getElementById("productPrice").innerText = price + " DKK";
}

function addToCart() {

  if (!userEmail) {
    userEmail = prompt("Indtast din email:");
    if (!userEmail) return;
    localStorage.setItem("email", userEmail);
  }

  cart.push(currentProduct);
  alert("Tilføjet til kurv 🔥");
}

function openCart() {
  hideAll();
  document.getElementById("cartPage").style.display = "block";

  const list = document.getElementById("cartItems");
  list.innerHTML = "";

  cart.forEach(item => {
    list.innerHTML += `<p>${item.price} DKK</p>`;
  });
}

function checkout() {
  let text = "Ny ordre fra: " + userEmail + "\\n\\n";

  cart.forEach(item => {
    text += "- Hoodie " + item.price + " DKK\\n";
  });

  window.location.href =
    `mailto:dinemail@gmail.com?subject=Ny ordre&body=${encodeURIComponent(text)}`;
}

function goHome() {
  hideAll();
  document.getElementById("home").style.display = "block";
}

function hideAll() {
  document.getElementById("home").style.display = "none";
  document.getElementById("hoodiesPage").style.display = "none";
  document.getElementById("productPage").style.display = "none";
  document.getElementById("cartPage").style.display = "none";
}
</script>

</body>
</html>
