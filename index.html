<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Resells ELITE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Montserrat; background:#050505; color:white; }
header { display:flex; justify-content:space-between; padding:20px; background:#0d0d0d; }
.logo { font-weight:900; font-size:1.6rem; }
.cart { cursor:pointer; }

.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; padding:30px; }
.card { background:#111; border-radius:20px; overflow:hidden; transition:.3s; position:relative; }
.card:hover { transform:scale(1.05); box-shadow:0 0 40px #00ff88; }
.card img { width:100%; height:250px; object-fit:cover; }
.card-content { padding:15px; text-align:center; }
.price { color:#00ff88; }
button { padding:10px 20px; border:none; border-radius:10px; background:#00ff88; cursor:pointer; }

.badge { position:absolute; top:10px; left:10px; background:red; padding:5px 10px; border-radius:10px; }

.cart-panel { position:fixed; right:-400px; top:0; width:300px; height:100%; background:#0d0d0d; padding:20px; transition:.3s; }
.cart-panel.open { right:0; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; }
.modal-box { background:white; color:black; padding:20px; border-radius:20px; width:300px; text-align:center; }

.countdown { text-align:center; font-size:1.2rem; margin:10px; color:#00ff88; }

.center { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:10px; }
input { padding:10px; border-radius:8px; border:none; }

</style>
</head>
<body>

<div id="app"></div>

<div id="payModal" class="modal">
  <div class="modal-box">
    <h2>MobilePay</h2>
    <p>Godkend betaling...</p>
    <button onclick="confirmPay()">Godkend</button>
  </div>
</div>

<script>
let user=null;
let cart=[];
let dropTime = new Date().getTime() + 600000;

function renderLogin(){
app.innerHTML=`<div class='center'>
<h1>DK RESELLS ELITE 😈</h1>
<input id='email' placeholder='Email'>
<input id='password' type='password' placeholder='Password'>
<button onclick='login()'>Login</button>
<button onclick='signup()'>Sign Up</button>
</div>`;
}

function login(){
if(localStorage.getItem(email.value)===password.value){ user=email.value; renderShop(); }
else alert('forkert');
}

function signup(){ localStorage.setItem(email.value,password.value); alert('oprettet'); }

function renderShop(){
const products=[
{name:'Nike Hoodie',price:499,img:'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf'},
{name:'Jordan 4',price:2499,img:'https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb'},
{name:'Trapstar Jacket',price:1799,img:'https://images.unsplash.com/photo-1593032465171-8b0c8b4c9cfa'}
];

app.innerHTML=`
<header>
<div class='logo'>DK RESELLS</div>
<div class='cart' onclick='toggleCart()'>🛒 (${cart.length})</div>
</header>

<div class='countdown' id='countdown'></div>

<div class='products'>
${products.map(p=>`
<div class='card'>
<img src='${p.img}'>
<div class='card-content'>
<h3>${p.name}</h3>
<div class='price'>${p.price} kr</div>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
</div>
`).join('')}
</div>

<div id='cartPanel' class='cart-panel'></div>
`;

startCountdown();
}

function addToCart(name,price){ cart.push({name,price}); renderShop(); }

function toggleCart(){
let panel=document.getElementById('cartPanel');
panel.classList.toggle('open');
panel.innerHTML=`<h2>Kurv</h2>
${cart.map(i=>`<p>${i.name} - ${i.price} kr</p>`).join('')}
<button onclick='openPay()'>Checkout</button>`;
}

function openPay(){ document.getElementById('payModal').style.display='flex'; }

function confirmPay(){
alert('Betaling gennemført 🔥');

document.getElementById('payModal').style.display='none';

fetch('https://formspree.io/f/YOUR_ID',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({user,cart})
});

cart=[];
renderShop();
}

function startCountdown(){
setInterval(()=>{
let now=new Date().getTime();
let diff=dropTime-now;
let min=Math.floor(diff/60000);
let sec=Math.floor((diff%60000)/1000);
let el=document.getElementById('countdown');
if(el) el.innerHTML=`NEXT DROP: ${min}m ${sec}s`;
},1000);
}

renderLogin();
</script>

</body>
</html>
