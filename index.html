<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Resells</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }
    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      cursor: pointer;
      font-weight: bold;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
let user = null;

function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="center">
      <h1>DK Resells 🔥</h1>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <button onclick="signup()">Sign Up</button>
    </div>
  `;
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (localStorage.getItem(email) === password) {
    user = email;
    renderShop();
  } else {
    alert("Forkert login");
  }
}

function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  localStorage.setItem(email, password);
  alert("Bruger oprettet!");
}

function renderShop() {
  const products = [
    { name: "Nike Hoodie", price: 499 },
    { name: "Jordan 4", price: 2499 },
    { name: "Trapstar Jacket", price: 1799 }
  ];

  document.getElementById("app").innerHTML = `
    <div class="products">
      ${products.map((p, i) => `
        <div class="card">
          <h2>${p.name}</h2>
          <p>${p.price} kr</p>
          <button onclick="buy('${p.name}', ${p.price})">Køb</button>
        </div>
      `).join("")}
    </div>
  `;
}

function buy(name, price) {
  alert(`Køb gennemført: ${name}`);

  // ⚠️ EMAIL virker ikke direkte i HTML
  // Brug fx Formspree eller backend hvis du vil sende mails
  console.log("Send email til dig selv med ordre:", user, name, price);
}

renderLogin();
</script>

</body>
</html>
