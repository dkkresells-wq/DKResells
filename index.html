<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodies Shop</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
}

h1 {
  text-align: center;
  margin: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  padding: 20px;
}

.item {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
}

.img {
  width: 100%;
  height: 120px;
  background-image: url('Hoodie.png'); /* dit billede */
  background-size: 1000% 1000%;
  border-radius: 10px;
}

.price {
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>🧥 Hoodies</h1>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

function randomPrice() {
  return Math.floor(Math.random() * 1200) + 300;
}

// hvor mange "felter" vi deler billedet i
const cols = 10;
const rows = 10;

for (let y = 0; y < rows; y++) {
  for (let x = 0; x < cols; x++) {

    const item = document.createElement("div");
    item.className = "item";

    const img = document.createElement("div");
    img.className = "img";

    img.style.backgroundPosition = `${(x/(cols-1))*100}% ${(y/(rows-1))*100}%`;

    const price = document.createElement("div");
    price.className = "price";
    price.innerText = randomPrice() + " DKK";

    item.appendChild(img);
    item.appendChild(price);
    grid.appendChild(item);
  }
}
</script>

</body>
</html>
