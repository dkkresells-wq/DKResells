<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Secure Access</title>

<style>
    body {
        background: black;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        text-align: center;
        margin-top: 15%;
    }

    h1 {
        font-size: 40px;
        text-shadow: 0 0 20px #00ffcc;
    }

    input {
        background: black;
        border: 2px solid #00ffcc;
        color: #00ffcc;
        padding: 10px;
        font-size: 18px;
        outline: none;
        text-align: center;
        margin-top: 20px;
        box-shadow: 0 0 10px #00ffcc;
    }

    button {
        background: black;
        border: 2px solid #00ffcc;
        color: #00ffcc;
        padding: 10px 20px;
        font-size: 18px;
        margin-top: 20px;
        cursor: pointer;
        box-shadow: 0 0 10px #00ffcc;
        transition: 0.3s;
    }

    button:hover {
        background: #00ffcc;
        color: black;
        box-shadow: 0 0 20px #00ffcc;
    }

    #status {
        margin-top: 30px;
        font-size: 20px;
        height: 30px;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>

<body>

<h1>🔐 SECURE ACCESS TERMINAL</h1>

<p>ENTER ACCESS CODE</p>

<input type="password" id="kode" placeholder="••••••" onkeydown="checkEnter(event)">
<br>
<button onclick="tjekKode()">AUTHENTICATE</button>

<div id="status"></div>

<script>
    function checkEnter(event) {
        if (event.key === "Enter") {
            tjekKode();
        }
    }

    function tjekKode() {
        const rigtigKode = "1337"; // ← skift kode her
        const input = document.getElementById("kode").value;
        const status = document.getElementById("status");

        status.innerHTML = "<span class='blink'>Checking...</span>";

        setTimeout(() => {
            if (input === rigtigKode) {
                status.innerHTML = "✅ ACCESS GRANTED";
                status.style.color = "#00ffcc";

                setTimeout(() => {
                    window.location.href = "https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL";
                }, 1500);

            } else {
                status.innerHTML = "❌ ACCESS DENIED";
                status.style.color = "red";
            }
        }, 1000);
    }
</script>

</body>
</html>
<link rel="icon" href="logo.png">
<title>DK Resells</title>
