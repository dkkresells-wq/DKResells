<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Shop</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* Forside */
.home {
  text-align: center;
  padding: 50px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
}

/* Hoodies side */
#hoodiesPage {
  display: none;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.item {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

.back {
  margin-bottom: 20px;
  cursor: pointer;
  display: inline-block;
}
</style>
</head>

<body>

<!-- FORSIDE -->
<div class="home" id="home">
  <h1>🔥 Min Shop</h1>

  <div class="cards">
    <div class="card" onclick="showHoodies()">🧥 Hoodies</div>
    <div class="card">🧢 Caps (kommer snart)</div>
    <div class="card">👕 T-Shirts (kommer snart)</div>
  </div>
</div>

<!-- HOODIES SIDE -->
<div id="hoodiesPage">
  <div class="back" onclick="goHome()">⬅ Tilbage</div>
  <h2>🧥 Hoodies</h2>

  <div class="grid" id="grid"></div>
</div>

<script>
// 🔥 HER SKAL DU INDSÆTTE DINE BILLEDER
const hoodies = [
  "HoodieRyg.png",
  "hoodie2.jpg",
  "hoodie3.jpg",
  "hoodie4.jpg",
  "hoodie5.jpg"
  // tilføj ALLE dine billeder her
];

function randomPrice() {
  return Math.floor(Math.random() * 1200) + 300;
}

function showHoodies() {
  document.getElementById("home").style.display = "none";
  document.getElementById("hoodiesPage").style.display = "block";

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  hoodies.forEach(img => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${img}">
      <p>${randomPrice()} DKK</p>
    `;

    grid.appendChild(div);
  });
}

function goHome() {
  document.getElementById("home").style.display = "block";
  document.getElementById("hoodiesPage").style.display = "none";
}
</script>

</body>
</html>
