<!DOCTYPE html>
<html>
<head>
    <title>Min side</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

    <h2>Indtast kode</h2>

    <input type="password" id="kode" placeholder="Skriv kode">
    <button onclick="tjekKode()">Gå videre</button>

    <p id="fejl" style="color:red;"></p>

    <script>
        function tjekKode() {
            var rigtigKode = "1234"; // ← skift til din egen kode
            var input = document.getElementById("kode").value;

            if (input === rigtigKode) {
                window.location.href = "https://www.youtube.com/";
            } else {
                document.getElementById("fejl").innerText = "Forkert kode!";
            }
        }
    </script>

</body>
</html>
