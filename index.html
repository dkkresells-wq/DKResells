<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DK Resells</title>
<link rel="icon" href="logo.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;

    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url("https://upload.wikimedia.org/wikipedia/commons/9/9c/Flag_of_Denmark.svg");
    background-size: cover;
    background-position: center;
}

h1 {
    margin-top: 80px;
    font-size: 42px;
    text-shadow: 0 0 15px #00c6ff;
}

/* glass box */
.box {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    width: 300px;
    margin: 30px auto;
    backdrop-filter: blur(10px);
}

/* input */
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}

/* buttons */
button {
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* menu hidden */
#menu {
    display: none;
}

.link {
    display: block;
    margin: 10px auto;
    width: 250px;
}

.status {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>DK RESELLS</h1>

<!-- 🔊 LYD -->
<audio id="clickSound" src="click.mp3"></audio>

<div id="login" class="box">
    <p>Indtast kode</p>
    <input type="password" id="kode" onkeydown="enter(event)">
    <br>
    <button onclick="login()">Login</button>
    <div class="status" id="status"></div>
</div>

<div id="menu" class="box">
    <h2>Vælg side</h2>

    <button class="link" onmouseover="klik()" onclick="klik(); go('https://www.temu.com/')">Temu</button>
    <button class="link" onmouseover="klik()" onclick="klik(); go('https://www.vinted.com/')">Vinted</button>
    <button class="link" onmouseover="klik()" onclick="klik(); go('https://wanes.dk/forsideww.repd')">RepDanes</button>
    <button class="link" onmouseover="klik()" onclick="klik(); go('https://www.acbuy.com/product?id=970916386889&u=XNX5L3&source=AL')">Hoodie Supplier</button>
    <button class="link" onmouseover="klik()" onclick="klik(); go('https://www.acbuy.com/product?id=922835150765&u=FIL339TES&source=AL')">Cap Supplier</button>
    <button class="link" onmouseover="klik()" onclick="klik(); go('https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL')">T-Shirt Supplier</button>

</div>

<script>
function klik(){
    document.getElementById("clickSound").currentTime = 0;
    document.getElementById("clickSound").play();
}

function enter(e){
    if(e.key === "Enter") login();
}

function login(){
    const kode = "1339"; // skift kode her
    const input = document.getElementById("kode").value;
    const status = document.getElementById("status");

    klik();

    if(input === kode){
        status.innerText = "Adgang godkendt";
        status.style.color = "lightgreen";

        setTimeout(()=>{
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "block";
        },500);

    } else {
        status.innerText = "Forkert kode";
        status.style.color = "red";
    }
}

function go(url){
    window.location.href = url;
}
</script>

</body>
</html>
