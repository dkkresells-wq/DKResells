<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DK Resells</title>
<link rel="icon" href="logo.png">

<style>
body {
    background: black;
    color: #00ffcc;
    font-family: "Courier New", monospace;
    text-align: center;
    margin-top: 10%;
}

h1 {
    text-shadow: 0 0 20px #00ffcc;
}

input, button {
    background: black;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    box-shadow: 0 0 10px #00ffcc;
}

button:hover {
    background: #00ffcc;
    color: black;
    cursor: pointer;
}

#menu {
    display: none;
    margin-top: 40px;
}

.linkBtn {
    display: block;
    margin: 10px auto;
    width: 250px;
}
</style>
</head>

<body>

<h1>🔐 DK RESELLS ACCESS</h1>

<div id="login">
    <p>Indtast kode:</p>
    <input type="password" id="kode">
    <br>
    <button onclick="tjekKode()">ENTER</button>
    <p id="fejl"></p>
</div>

<div id="menu">
    <h2>🌐 Vælg side</h2>

    <button class="linkBtn" onclick="go('https://www.temu.com/')">Temu</button>
    <button class="linkBtn" onclick="go('https://www.vinted.com/')">Vinted</button>
    <button class="linkBtn" onclick="go('https://wanes.dk/forsideww.repd')">RepDanes</button>
    <button class="linkBtn" onclick="go('https://www.acbuy.com/product?id=970916386889&u=XNX5L3&source=AL')">Hoodie Supplier</button>
    <button class="linkBtn" onclick="go('https://www.acbuy.com/product?id=922835150765&u=FIL339TES&source=AL')">Cap Supplier</button>
    <button class="linkBtn" onclick="go('https://www.acbuy.com/product?id=837637789856&u=XNX5L3&source=AL')">T-Shirt Supplier</button>

</div>

<script>
function tjekKode() {
    const rigtigKode = "1234"; // ← skift kode her
    const input = document.getElementById("kode").value;

    if (input === rigtigKode) {
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
    } else {
        document.getElementById("fejl").innerText = "Forkert kode!";
        document.getElementById("fejl").style.color = "red";
    }
}

function go(url) {
    window.location.href = url;
}
</script>

</body>
</html>
