<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Mit Mega Fede Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }

    .container {
      text-align: center;
      padding: 100px 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      animation: fadeIn 1s ease;
    }

    p {
      color: #9ca3af;
      font-size: 20px;
      max-width: 600px;
      margin: 0 auto 40px;
      animation: fadeIn 1.5s ease;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 80px;
    }

    button {
      padding: 15px 30px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .primary {
      background: white;
      color: black;
    }

    .primary:hover {
      transform: scale(1.1);
    }

    .secondary {
      background: transparent;
      border: 1px solid white;
      color: white;
    }

    .secondary:hover {
      background: white;
      color: black;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
    }

    .footer {
      margin-top: 100px;
      color: #6b7280;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Mit Mega Fede Website</h1>
    <p>Velkommen til min GitHub side. Her finder du mine projekter og ting jeg bygger.</p>

    <div class="buttons">
      <button class="primary" onclick="scrollToSection()">Se Projekter</button>
      <button class="secondary" onclick="alert('Kontakt mig 😎')">Kontakt</button>
    </div>

    <div class="cards" id="projekter">
      <div class="card">
        <h2>👤 Om mig</h2>
        <p>Jeg elsker at kode og bygge fede ting.</p>
      </div>

      <div class="card">
        <h2>💻 GitHub</h2>
        <p>Tjek mine projekter og kode.</p>
      </div>

      <div class="card">
        <h2>📬 Kontakt</h2>
        <p>Skriv hvis du vil samarbejde.</p>
      </div>
    </div>

    <div class="footer">
      © 2026 - Lavet med 🔥
    </div>
  </div>

  <script>
    function scrollToSection() {
      document.getElementById("projekter").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
